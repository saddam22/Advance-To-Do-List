<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do List App</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen">
<div class="bg-white shadow-xl rounded-xl p-6 w-96">
	<h1 class="text-2xl font-semibold text-center mb-4">To Do List</h1>
 
	<div class="flex gap-2 mb-4">
		<input id="taskInput" type="text" placeholder="Add New Task........." class="border w-full px-3 py-2 rounded-lg">

		<button onclick="addTask()" class="bg-blue-500 text-white px-4 rounded-lg">Add</button>
	</div>

	<div class="flex justify-between mb-4 text-sm">
		<button onclick="filterTasks('all')" class="text-blue-500">All</button>
		<button onclick="filterTasks('pending')" class="text-yellow-500">Pending</button>
		<button onclick="filterTasks('completed')" class="text-green-500">Completed</button>
	</div>
	<ul id="taskList" class="space-y-2"></ul>
	<p class="text-center text-sm mt-4">Total Tasks: <span id="taskCount">0</span></p>
</div>

<script src="script.js"></script>
</body>
</html>
